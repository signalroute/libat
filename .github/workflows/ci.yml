name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install addlicense
        run: go install github.com/google/addlicense@latest
      
      - name: Check license headers
        run: |
          $HOME/go/bin/addlicense -check -c "Yanujz" -l "MIT" \
            include/at/*.hpp \
            tests/*.cpp \
            examples/*.cpp \
            CMakeLists.txt

  build-gcc:
    name: Build & Test (GCC 15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-15 cmake ninja-build
      
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-clang:
    name: Build & Test (Clang 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 cmake ninja-build
      
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-msvc:
    name: Build & Test (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022"
      
      - name: Build
        run: cmake --build build --config Release --parallel
      
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

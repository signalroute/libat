name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------------------------
  # License header check  (google/addlicense, SPDX GPL-3.0-or-later)
  # ---------------------------------------------------------------------------
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Check SPDX headers
        run: |
          addlicense -check -c "yanujz" -l gpl3 -s \
            include/at/*.hpp \
            include/at/*.in \
            tests/*.cpp \
            examples/*.cpp \
            CMakeLists.txt

  # ---------------------------------------------------------------------------
  # GCC 15  (libstdc++-15 ships std::generator natively)
  # ---------------------------------------------------------------------------
  build-gcc:
    name: Build & Test (GCC 15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-15 cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Clang 18 + GCC-14 libstdc++ headers
  #
  # Root cause of previous failure:
  #   ubuntu-latest ships GCC 13 by default.  GCC 13's libstdc++ does NOT
  #   include <generator> (added in GCC 14 / C++23).  Installing g++-14
  #   alongside clang-18 makes Clang pick up GCC-14's libstdc++ headers and
  #   the <generator> header becomes available without any extra flags.
  # ---------------------------------------------------------------------------
  build-clang:
    name: Build & Test (Clang 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # g++-14 provides libstdc++-14 headers, which include <generator>.
          # clang-18 auto-detects the highest installed GCC and uses its headers.
          sudo apt-get install -y clang-18 g++-14 cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # MSVC (Visual Studio 2022)
  # ---------------------------------------------------------------------------
  build-msvc:
    name: Build & Test (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

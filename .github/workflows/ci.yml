name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------------------------
  # License header check  (google/addlicense, SPDX GPL-3.0-or-later)
  # ---------------------------------------------------------------------------
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Check SPDX headers
        run: |
          addlicense -check -c "yanujz" -l gpl3 -s \
            include/at/*.hpp \
            include/at/*.in \
            tests/*.cpp \
            examples/*.cpp \
            CMakeLists.txt

  # ---------------------------------------------------------------------------
  # GCC 15  (libstdc++-15 ships std::generator natively)
  # ---------------------------------------------------------------------------
  build-gcc:
    name: Build & Test (GCC 15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-15 cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-15 \
            -DCMAKE_C_COMPILER=gcc-15 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Clang 18 + GCC-14 libstdc++ headers
  #
  # <generator> (C++23) requires libstdc++-14.  ubuntu-latest ships GCC 13
  # by default, so we install g++-14 explicitly.  Clang does NOT auto-promote
  # to the highest installed GCC — we must pass --gcc-install-dir to tell it
  # exactly which GCC installation to use for its runtime headers and library.
  # ---------------------------------------------------------------------------
  build-clang:
    name: Build & Test (Clang 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # g++-14 provides the libstdc++-14 headers that contain <generator>.
          sudo apt-get install -y clang-18 g++-14 libstdc++-14-dev cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/14" \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # MSVC (Visual Studio 2022)
  # ---------------------------------------------------------------------------
  build-msvc:
    name: Build & Test (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

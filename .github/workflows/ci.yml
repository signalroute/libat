# SPDX-License-Identifier: MIT
# SPDX-FileCopyrightText: 2026 Signalroute

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------------------------
  # License header check  (google/addlicense, SPDX MIT)
  # ---------------------------------------------------------------------------
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Check SPDX headers
        run: |
          addlicense -check -c "Signalroute" -l mit -s \
            include/at/*.hpp \
            include/at/*.in \
            tests/*.cpp \
            examples/*.cpp \
            CMakeLists.txt

  # ---------------------------------------------------------------------------
  # GCC matrix — g++-13 (ships on ubuntu-24.04) and g++-15 (toolchain PPA)
  # ---------------------------------------------------------------------------
  build-gcc:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - compiler: g++-13
            c_compiler: gcc-13
            extra_apt: g++-13
            ppa: false
          - compiler: g++-15
            c_compiler: gcc-15
            extra_apt: g++-15
            ppa: true
    steps:
      - uses: actions/checkout@v4

      - name: Add toolchain PPA
        if: matrix.ppa
        run: sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.extra_apt }} cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Clang 18  (libc++ 18)
  #
  # libc++ 18 ships std::expected (added LLVM 16) but not std::generator
  # (added LLVM 20).  The <generator> include is already skipped on all
  # Clang builds via !defined(__clang__) guard in parser.hpp, so
  # tokenizer::stream() is simply not compiled — all other C++23 features
  # (std::expected, <format>, std::from_chars …) work fine.
  #
  # clang-18 is pre-installed on ubuntu-24.04; only libc++ packages are added.
  # ---------------------------------------------------------------------------
  build-clang:
    name: Build & Test (Clang 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev cmake ninja-build

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # macOS (GCC 14 — Apple Clang lacks std::generator)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build & Test (GCC 14 / macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install gcc@14 cmake ninja

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # MSVC (Visual Studio 2022)
  # ---------------------------------------------------------------------------
  build-msvc:
    name: Build & Test (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

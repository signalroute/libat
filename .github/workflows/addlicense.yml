name: Auto-License

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  addlicense:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository # Prevent runs from forks
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Apply Licenses
        # Changed to gpl3 and added -s for the SPDX tag you wanted.
        # Explicitly targeting your C++ files.
        run: |
          addlicense -c "Yanujz" -l gpl3 -s \
            "include/at/*.hpp" \
            "tests/*.cpp" \
            "examples/*.cpp"

      - name: Commit changes
        run: |
          if [[ -n $(git status -s) ]]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add .
            git commit -m "chore: apply GPL-3.0-or-later license headers"
            git push
          fi